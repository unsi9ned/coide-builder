name: Build CoIDE Portable

on:
  workflow_dispatch:  # Ручной запуск
  push:
    tags:
      - 'v*'          # Автоматический запуск при создании тега v1.0.0, v2.0.0 и т.д.

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4
      
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install Python dependencies
          run: |
            pip install colorama

        - name: Run setup script
          run: |
            python setup.py --install-path "C:\CooCox\CoIDE" --silent
      
        - name: Verify portable archive exists
          run: |
            if (Test-Path "portable/CoIDE-portable.zip") {
              Write-Host "Portable archive found"
            } else {
              Write-Host "Portable archive not found!"
              exit 1
            }
          shell: pwsh

        - name: Get version
          id: get_version
          run: |
            if ($env:GITHUB_REF_TYPE -eq 'tag') {
              $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
              echo "version=$VERSION" >> $env:GITHUB_OUTPUT
              echo "is_tag=true" >> $env:GITHUB_OUTPUT
            } else {
              $VERSION = "manual-${{ github.run_number }}"
              echo "version=$VERSION" >> $env:GITHUB_OUTPUT
              echo "is_tag=false" >> $env:GITHUB_OUTPUT
            }
          shell: pwsh

        - name: Rename and move portable archive
          run: |
            $VERSION = "${{ steps.get_version.outputs.version }}"
            $NEW_NAME = "CoIDE-v${VERSION}.zip"
            
            # Копируем файл в корень с новым именем
            Copy-Item "portable/CoIDE-portable.zip" $NEW_NAME
            
            Write-Host "Created: $NEW_NAME"
            Get-ChildItem $NEW_NAME
          shell: pwsh

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: CoIDE-v${{ steps.get_version.outputs.version }}
            path: CoIDE-*.zip
            retention-days: 7

        - name: Create Release (only for tags)
          if: steps.get_version.outputs.is_tag == 'true'
          uses: softprops/action-gh-release@v2
          with:
            files: CoIDE-*.zip
            name: "CoIDE v${{ steps.get_version.outputs.version }}"
            tag_name: ${{ github.ref_name }}
            generate_release_notes: true